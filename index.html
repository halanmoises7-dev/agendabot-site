<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agendabot-site</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
<script 
  defer 
  src="https://agendabot-web.vercel.app/widget.js" 
  data-bot-id="halanmoises">
</script>

<div id="balao-halan-mobile" style="display: none; opacity: 0; position: fixed; bottom: 38px; right: 100px; background: #0f172a; color: white; padding: 10px 16px; border-radius: 14px; font-size: 13px; font-weight: 800; font-family: sans-serif; z-index: 999999; box-shadow: 0 4px 15px rgba(0,0,0,0.3); align-items: center; gap: 10px; transition: opacity 0.5s ease; text-transform: uppercase;">
  <span id="texto-balao">Clique para testar</span>
  <span id="x-fechar-mobile" style="cursor: pointer; padding: 2px 8px; background: rgba(255,255,255,0.2); border-radius: 50%; line-height: 1; font-size: 16px;">&times;</span>
</div>

<style>
  #balao-halan-mobile::after {
    content: "";
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 6px solid #0f172a;
  }

  /* Ajuste específico para Celular */
  @media (max-width: 600px) {
    #balao-halan-mobile {
      right: 90px !important; /* Aproxima um pouco mais da bolinha no celular */
      bottom: 35px !important;
      font-size: 11px !important; /* Letra um pouco menor para não ocupar a tela toda */
      padding: 8px 12px !important;
    }
    #texto-balao {
      white-space: normal; /* Permite quebrar linha se o celular for muito pequeno */
      max-width: 120px;
      text-align: center;
    }
  }
</style>

<script>
  setTimeout(function() {
    var b = document.getElementById('balao-halan-mobile');
    if (b) {
      b.style.display = 'flex';
      setTimeout(function() { b.style.opacity = '1'; }, 50);
    }
  }, 3000);

  // Fecha no X
  document.getElementById('x-fechar-mobile').onclick = function(e) {
    e.stopPropagation();
    document.getElementById('balao-halan-mobile').style.display = 'none';
  };

  // Fecha se abrir o chat
  document.addEventListener('mousedown', function(e) {
    if (e.target.closest('div[style*="width: 64px"]') || e.target.closest('svg')) {
      var b = document.getElementById('balao-halan-mobile');
      if (b) b.style.display = 'none';
    }
  });
</script>

  </body>
</html>
